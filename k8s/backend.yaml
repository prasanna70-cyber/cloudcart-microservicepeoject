apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ecommerce
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: prasannapothula/cloudcart-api-gateway:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: MYSQL_HOST
          value: "mysql"
        - name: MYSQL_USER
          value: "root"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cloudcart-secrets
              key: MYSQL_ROOT_PASSWORD
        - name: DB_NAME
          value: "none"
        - name: REDIS_HOST
          value: "redis"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: cloudcart-secrets
              key: JWT_SECRET
        - name: AUTH_URL
          value: "http://auth-service"
        - name: USER_URL
          value: "http://user-service"
        - name: PRODUCT_URL
          value: "http://product-service"
        - name: INVENTORY_URL
          value: "http://inventory-service"
        - name: CART_URL
          value: "http://cart-service"
        - name: ORDER_URL
          value: "http://order-service"
        - name: PAYMENT_URL
          value: "http://payment-service"
        - name: SHIPPING_URL
          value: "http://shipping-service"
        - name: NOTIFICATION_URL
          value: "http://notification-service"
        - name: REVIEW_URL
          value: "http://review-service"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ecommerce
  labels:
    app: api-gateway
    cloudcart-monitor: "true"
spec:
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 80
    targetPort: 3000

